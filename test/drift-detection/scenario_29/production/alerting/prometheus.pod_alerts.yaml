apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rhtap-pod-alerting-rules
  labels:
    tenant: rhtap
spec:
  groups:
  - name: pod_alerts
    interval: 1m
    rules:
    - alert: PodNotReady
      expr: |
        kube_pod_status_phase{phase=~"Pending|Unknown|Failed", namespace!~"(.*-tenant|.*-env|openshift-.*|kube-.*)"} == 1
        unless ignoring (phase) (kube_pod_status_unschedulable == 1)
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: Pod {{ $labels.pod }} is not ready
