evaluation_interval: 1m

rule_files:
  - support_ops_availability_recording_rules.yaml

tests:
  - interval: 1m
    name: SupportOpsAvailabilityTest
    input_series:
      # Test case 1: Fully available chat-bot deployment (3/3 replicas)
      - series: 'kube_deployment_status_replicas_available{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '3 3 3 3 3'
      - series: 'kube_deployment_spec_replicas{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '3 3 3 3 3'

      # Test case 2: Partially available chat-bot deployment (2/3 replicas)
      - series: 'kube_deployment_status_replicas_available{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '2 2 2 2 2'
      - series: 'kube_deployment_spec_replicas{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '3 3 3 3 3'

      # Test case 3: Unavailable chat-bot deployment (0/3 replicas)
      - series: 'kube_deployment_status_replicas_available{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '0 0 0 0 0'
      - series: 'kube_deployment_spec_replicas{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '3 3 3 3 3'

      # Test case 4: Single replica deployment that's available (1/1)
      - series: 'kube_deployment_status_replicas_available{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '1 1 1 1 1'
      - series: 'kube_deployment_spec_replicas{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '1 1 1 1 1'

      # Test case 5: Edge case with 0 spec replicas (should be clamped to 1)
      - series: 'kube_deployment_status_replicas_available{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '0 0 0 0 0'
      - series: 'kube_deployment_spec_replicas{deployment="chat-bot", namespace="konflux-user-support"}'
        values: '0 0 0 0 0'

      # Test case 6: Deployment from different namespace (should not be picked up)
      - series: 'kube_deployment_status_replicas_available{deployment="chat-bot", namespace="other-namespace"}'
        values: '2 2 2 2 2'
      - series: 'kube_deployment_spec_replicas{deployment="chat-bot", namespace="other-namespace"}'
        values: '2 2 2 2 2'

      # Test case 7: Different deployment in same namespace (should not be picked up)
      - series: 'kube_deployment_status_replicas_available{deployment="other-deployment", namespace="konflux-user-support"}'
        values: '1 1 1 1 1'
      - series: 'kube_deployment_spec_replicas{deployment="other-deployment", namespace="konflux-user-support"}'
        values: '1 1 1 1 1'

    promql_expr_test:
      - expr: konflux_up
        eval_time: 5m
        exp_samples:
          # Fully available: 3/3 = 1.0, floor(1.0) = 1
          - labels: 'konflux_up{service="chat-bot", check="replicas-available", deployment="chat-bot", namespace="konflux-user-support"}'
            value: 1
