evaluation_interval: 1m

rule_files:
  - 'prometheus.prometheus_pod_high_memory_usage_alert.yaml'

tests:
  - interval: 1m
    input_series:
      # Memory usage series: 95% usage for 10 minutes
      - series: "node_namespace_pod_container:container_memory_working_set_bytes{namespace='appstudio-monitoring',pod='prometheus-appstudio-federate-ms-1',container='prometheus',source_cluster='stone-stg-rh01'}"
        values: "95x10"
      # Memory limits series: 100% limits
      - series: "cluster:namespace:pod_memory:active:kube_pod_container_resource_limits{namespace='appstudio-monitoring',pod='prometheus-appstudio-federate-ms-1',container='prometheus',resource='memory',source_cluster='stone-stg-rh01'}"
        values: "100x10"

    alert_rule_test:
      - eval_time: 10m
        alertname: PrometheusPodHighMemoryUsage
        exp_alerts:
          - exp_labels:
              namespace: "appstudio-monitoring"
              pod: "prometheus-appstudio-federate-ms-1"
              severity: "warning"
              component: "prometheus"
              source_cluster: "stone-stg-rh01"
            exp_annotations:
              summary: "Prometheus pod prometheus-appstudio-federate-ms-1 has high memory usage on cluster stone-stg-rh01"
              description: "Prometheus pod prometheus-appstudio-federate-ms-1 in namespace appstudio-monitoring on cluster stone-stg-rh01 is using more than 90% of its memory limit."
              alert_routing_key: "<!subteam^S06LGCC3C2V>"
