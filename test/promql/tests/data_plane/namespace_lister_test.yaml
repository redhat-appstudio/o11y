---
evaluation_interval: 1m

rule_files:
  - prometheus.namespace_lister_alerts.yaml

tests:
# --- alerts for synchronization failures ---

# repeated failures over a long time (using default sync time of 10 minutes) should trigger an alert
- interval: 1m
  input_series:
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="success"}'
    values: '1x30'
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="failed", error="foo"}'
    values: '1x10 2x10 3x10 4x10 5x10 6x10'
  alert_rule_test:
  - eval_time: 60m
    alertname: NamespaceListerSynchronizationFailure
    exp_alerts:
    - exp_labels:
        component: namespace-lister
        error: foo
        severity: warning
        source_cluster: stone-stg-m01
        status: failed
      exp_annotations:
        alert_routing_key: "<!subteam^S06G3MJT516>"
        summary:
          Namespace-lister cache has reported 2 synchronization failures in 30 minutes
        description: >-
          Namespace-lister's cache on cluster 'stone-stg-m01' has reported 2
          synchronization failures in 30 minutes
        team: workspaces
        runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/namespace-lister/README.md

# a series of rapid-fire failures should trigger an alert
- interval: 1m
  input_series:
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="success"}'
    values: '1+1x15 15 15+1x14'
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="failed", error="bar"}'
    values: '_x15 1 2 3 4 5x40'
  alert_rule_test:
  - eval_time: 26m
    alertname: NamespaceListerSynchronizationFailure
    exp_alerts:
    - exp_labels:
        component: namespace-lister
        error: bar
        severity: warning
        source_cluster: stone-stg-m01
        status: failed
      exp_annotations:
        alert_routing_key: "<!subteam^S06G3MJT516>"
        summary: >-
          Namespace-lister cache has reported 2 synchronization failures in 30 minutes
        description: >-
          Namespace-lister's cache on cluster 'stone-stg-m01' has reported 2
          synchronization failures in 30 minutes
        team: workspaces
        runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/namespace-lister/README.md

# a single failure shouldn't trigger an alert
- interval: 1m
  input_series:
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="success"}'
    values: '1 2x30'
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="failed", error="baz"}'
    values: '_x15 1x15'

  alert_rule_test:
  - eval_time: 31m
    alertname: NamespaceListerSynchronizationFailure
    exp_alerts: []

# two failures shouldn't trigger an alert
- interval: 1m
  input_series:
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="success"}'
    values: '1 2x30'
  - series: 'namespace_lister_accesscache_synch_op_total{source_cluster="stone-stg-m01", status="failed", error="baz"}'
    values: '_x15 1 2x14'

  alert_rule_test:
  - eval_time: 30m
    alertname: NamespaceListerSynchronizationFailure
    exp_alerts: []

# --- alerts for namespace-lister returning internal errors ---

# a steady stream of 500s should be an alert
- interval: 1m
  input_series:
  - series: 'namespace_lister_api_counter{source_cluster="stone-stg-m01", code="500", pod="namespace-lister-5b59b78dd5-xx58b"}'
    values: '1+1x20'
  alert_rule_test:
  - eval_time: 20m
    alertname: NamespaceListerInternalError
    exp_alerts:
    - exp_labels:
        component: namespace-lister
        severity: warning
        pod: namespace-lister-5b59b78dd5-xx58b
        code: "500"
        source_cluster: stone-stg-m01
      exp_annotations:
        alert_routing_key: "<!subteam^S06G3MJT516>"
        summary: >-
          Namespace-lister is reporting too many internal errors
        description: >-
          Namespace-lister pod 'namespace-lister-5b59b78dd5-xx58b' on cluster 'stone-stg-m01' is returning internal errors
        team: workspaces
        runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/namespace-lister/README.md

# no change in 500-level errors should have no alerts
- interval: 1m
  input_series:
  - series: 'namespace_lister_api_counter{source_cluster="stone-stg-m01", code="500"}'
    values: '1x10'
  alert_rule_test:
  - eval_time: 10m
    alertname: NamespaceListerInternalError
    exp_alerts: []

# replica count = 0
- interval: 1m
  input_series:
    - series: 'konflux_up{namespace="namespace-lister", check="replicas-available", service="namespace-lister", source_cluster="c1"}'
      values: '0 0 0 0 0'
    - series: 'konflux_up{namespace="namespace-lister", check="replicas-available", service="namespace-listerr", source_cluster="c2"}'
      values: '1 1 1 1 1'

  alert_rule_test:
    - eval_time: 5m
      alertname: NameSpaceListerDown
      exp_alerts:
        - exp_labels:
            severity: critical
            component: namespace-lister
            check: replicas-available
            namespace: namespace-lister
            service: namespace-lister
            slo: "true"
            source_cluster: c1
          exp_annotations:
            summary: namespace-lister is down in cluster c1
            description: >
              The namespace-lister pod has been down for 5min in cluster c1
            alert_team_handle: <!subteam^S05Q1P4Q2TG>
            team: konflux-infra
            runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/namespace-lister/README.md

# namespace-lister serving only errors - should fire
- interval: 1m
  input_series:
  - series: 'namespace_lister_api_counter{source_cluster="c1", code="500", pod="pod-1"}'
    values: '0+1x15'

  alert_rule_test:
  - eval_time: 8m
    alertname: NamespaceListerNotServingRequests
    exp_alerts:
    - exp_labels:
        severity: warning
        component: namespace-lister
        source_cluster: c1
        pod: pod-1
      exp_annotations:
        summary: namespace-lister is receiving requests but returning no successful responses in cluster c1
        description: >
          namespace-lister pod 'pod-1' on cluster 'c1'
          is receiving requests but returning no 2xx responses.
        alert_routing_key: <!subteam^S06G3MJT516>
        team: workspaces
        runbook_url: null

# namespace-lister serving mix of 200 and 500 - should not fire
- interval: 1m
  input_series:
  - series: 'namespace_lister_api_counter{source_cluster="c2", code="200", pod="pod-2"}'
    values: '0+10x15'
  - series: 'namespace_lister_api_counter{source_cluster="c2", code="500", pod="pod-2"}'
    values: '0+1x15'

  alert_rule_test:
  - eval_time: 8m
    alertname: NamespaceListerNotServingRequests
    exp_alerts: []

# namespace-lister serving equal rates of 2xx and 5xx - should not fire (any nonzero 2xx suppresses the alert)
- interval: 1m
  input_series:
  - series: 'namespace_lister_api_counter{source_cluster="c4", code="200", pod="pod-4"}'
    values: '0+1x15'
  - series: 'namespace_lister_api_counter{source_cluster="c4", code="500", pod="pod-4"}'
    values: '0+1x15'

  alert_rule_test:
  - eval_time: 8m
    alertname: NamespaceListerNotServingRequests
    exp_alerts: []

# namespace-lister idle, no incoming traffic - should not fire
- interval: 1m
  input_series:
  - series: 'namespace_lister_api_counter{source_cluster="c3", code="200", pod="pod-3"}'
    values: '5x15'

  alert_rule_test:
  - eval_time: 8m
    alertname: NamespaceListerNotServingRequests
    exp_alerts: []
