evaluation_interval: 1m

rule_files:
  - prometheus.internal_requests_alerts.yaml

tests:
  - name: InternalRequestsCountBelowThreshold
    interval: 1m
    input_series:
      # count is below 300 - no alert expected
      - series: 'apiserver_storage_objects{resource="internalrequests.appstudio.redhat.com", instance="api:6443"}'
        values: '100x20'
    alert_rule_test:
      - eval_time: 20m
        alertname: InternalRequestsQuotaNearLimit
        exp_alerts: []

  - name: InternalRequestsCountAtThreshold
    interval: 1m
    input_series:
      # count is at exactly 500 - no alert (threshold is strictly > 500)
      - series: 'apiserver_storage_objects{resource="internalrequests.appstudio.redhat.com", instance="api:6443"}'
        values: '500x20'
    alert_rule_test:
      - eval_time: 20m
        alertname: InternalRequestsQuotaNearLimit
        exp_alerts: []

  - name: InternalRequestsCountAboveThreshold
    interval: 1m
    input_series:
      # count exceeds 500 for 15m - alert expected
      - series: 'apiserver_storage_objects{resource="internalrequests.appstudio.redhat.com", instance="api:6443"}'
        values: '550x20'
    alert_rule_test:
      - eval_time: 15m
        alertname: InternalRequestsQuotaNearLimit
        exp_alerts:
          - exp_labels:
              severity: warning
              component: release-service
            exp_annotations:
              summary: >-
                InternalRequests count has exceeded the threshold
              description: >-
                The number of InternalRequests has exceeded 500. The cleanup job may be
                misbehaving, causing stale InternalRequests to accumulate.
              alert_routing_key: internal-services
              runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/release-service/internal-requests-quota.md
              team: release

  - name: InternalRequestsCleanupJobNotFailed
    interval: 1m
    input_series:
      # cleanup job has not failed - no alert expected
      - series: 'kube_job_status_failed{namespace="release-service", job_name="cleanup-timed-out-pipelineruns-internal-requests-28914560", source_cluster="cluster01"}'
        values: '0x5'
    alert_rule_test:
      - eval_time: 5m
        alertname: InternalRequestsCleanupJobFailed
        exp_alerts: []

  - name: InternalRequestsCleanupJobHasFailed
    interval: 1m
    input_series:
      # cleanup job has failed - alert expected after 1m
      - series: 'kube_job_status_failed{namespace="release-service", job_name="cleanup-timed-out-pipelineruns-internal-requests-28914560", source_cluster="cluster01"}'
        values: '1x5'
    alert_rule_test:
      - eval_time: 1m
        alertname: InternalRequestsCleanupJobFailed
        exp_alerts:
          - exp_labels:
              severity: warning
              source_cluster: cluster01
              component: release-service
            exp_annotations:
              summary: >-
                InternalRequests cleanup job failed on cluster cluster01
              description: >-
                The InternalRequests cleanup job has failed on cluster cluster01.
                Stale InternalRequests may accumulate and approach the quota limit.
              alert_routing_key: internal-services
              runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/release-service/internal-requests-quota.md
              team: release
