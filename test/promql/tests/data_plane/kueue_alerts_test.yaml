evaluation_interval: 1m

rule_files:
  - 'prometheus.kueue_alerts.yaml'

tests:
  # Test KueueCELEvaluationFailures alert
  - interval: 1m
    input_series:
      - series: 'tekton_kueue_cel_evaluations_total{result="failure", source_cluster="c1"}'
        values: '0 1 2 3 4 5'
      - series: 'tekton_kueue_cel_evaluations_total{result="success", source_cluster="c1"}'
        values: '0 10 20 30 40 50'
    alert_rule_test:
      - eval_time: 2m
        alertname: KueueCELEvaluationFailures
        exp_alerts:
          - exp_labels:
              severity: critical
              component: tekton-kueue
              slo: "true"
              result: "failure"
              source_cluster: c1
            exp_annotations:
              summary: "Tekton Kueue CEL evaluation failures detected"
              description: "2 CEL evaluation failures occurred in the last 5 minutes in cluster c1"
              runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/infra/queue/alert-KueueCELEvaluationFailures.md?ref_type=heads
              alert_team_handle: <!subteam^S05Q1P4Q2TG>
              team: konflux-infra

  # Test KueueMutatingWebhookLowSuccessRate alert
  - interval: 1m
    input_series:
      - series: 'apiserver_admission_webhook_request_total{name="pipelinerun-kueue-defaulter.tekton-kueue.io", code="200", instance="i1", source_cluster="c1"}'
        values: '0 95 190 285 380 475'
      - series: 'apiserver_admission_webhook_request_total{name="pipelinerun-kueue-defaulter.tekton-kueue.io", code="400", instance="i1", source_cluster="c1"}'
        values: '0 1 2 3 4 5'
      - series: 'apiserver_admission_webhook_request_total{name="pipelinerun-kueue-defaulter.tekton-kueue.io", code="500", instance="i1", source_cluster="c1"}'
        values: '0 5 10 15 20 25'
    alert_rule_test:
      - eval_time: 11m
        alertname: KueueMutatingWebhookLowSuccessRate
        exp_alerts:
          - exp_labels:
              severity: critical
              component: kueue
              slo: "false"
              source_cluster: c1
              instance: i1
            exp_annotations:
              summary: "Kueue mutating webhook success rate is below 99%"
              description: "The mutating webhook 'pipelinerun-kueue-defaulter.tekton-kueue.io' has had a success rate below 99% over the past 10 minutes in cluster c1. Possible causes include webhook errors, rejections, or unreachability (e.g., code=600)."
              runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/infra/queue/queue.md?ref_type=heads
              alert_routing_key: infra
              team: konflux-infra

  # Test KueueClusterQueueNotActive alert
  - interval: 1m
    input_series:
      - series: 'kueue_cluster_queue_status{cluster_queue="cluster-pipeline-queue", status="active", source_cluster="c1"}'
        values: '0 0 0 0 0'
      - series: 'kueue_cluster_queue_status{cluster_queue="cluster-pipeline-queue", status="inactive", source_cluster="c1"}'
        values: '1 1 1 1 1'
    alert_rule_test:
      - eval_time: 3m
        alertname: KueueClusterQueueNotActive
        exp_alerts:
          - exp_labels:
              severity: critical
              component: kueue
              slo: "true"
              status: "active"
              source_cluster: c1
            exp_annotations:
              summary: "Kueue cluster queue is not active"
              description: "Cluster queue 'cluster-pipeline-queue' is not in active state in cluster c1"
              runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/infra/queue/queue.md?ref_type=heads
              alert_team_handle: <!subteam^S05Q1P4Q2TG>
              team: konflux-infra

  # SPRE-5085: Test KueueClusterQueueResourceSaturation
  - interval: 1m
    input_series:
      - series: 'kueue_cluster_queue_resource_reservation{cluster_queue="cluster-pipeline-queue", resource="cpu", source_cluster="c1"}'
        values: '95+0x60'
      - series: 'kueue_cluster_queue_nominal_quota{cluster_queue="cluster-pipeline-queue", resource="cpu", source_cluster="c1"}'
        values: '100+0x60'
    alert_rule_test:
      - eval_time: 15m
        alertname: KueueClusterQueueResourceSaturation
        exp_alerts:
          - exp_labels:
              severity: high
              component: kueue
              resource: cpu
              cluster_queue: cluster-pipeline-queue
              source_cluster: c1
            exp_annotations:
              summary: "Kueue Resource Saturation: cpu above 90%"
              description: "Resource cpu in cluster c1 (queue: cluster-pipeline-queue) is nearing capacity (>90%). Future workloads may experience delays."
              runbook_url: "https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/infra/queue/alert-KueueResourceSaturation.md"
              alert_routing_key: infra
              team: konflux-infra

  # SPRE-5085: Test KueueHighAdmissionWaitTimePreMerge
  - interval: 1m
    input_series:
      - series: 'kueue_admission_wait_time_seconds_bucket{cluster_queue="cluster-pipeline-queue", workload_name_prefix="pre-merge", le="600", source_cluster="c1"}'
        values: '0 1 2'
      - series: 'kueue_admission_wait_time_seconds_bucket{cluster_queue="cluster-pipeline-queue", workload_name_prefix="pre-merge", le="900", source_cluster="c1"}'
        values: '0 5 10'
      - series: 'kueue_admission_wait_time_seconds_bucket{cluster_queue="cluster-pipeline-queue", workload_name_prefix="pre-merge", le="+Inf", source_cluster="c1"}'
        values: '0 5 10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KueueHighAdmissionWaitTimePreMerge
        exp_alerts:
          - exp_labels:
              severity: warning
              component: kueue
              source_cluster: c1
            exp_annotations:
              summary: "High admission wait time for Pre-Merge pipelines"
              description: "99th percentile wait time for Pre-Merge is 896.25s (>10m) in cluster c1"
              alert_routing_key: infra
              team: konflux-infra

  # SPRE-5085: Test KueueHighAdmissionWaitTimeMintmaker
  - interval: 1m
    input_series:
      - series: 'kueue_admission_wait_time_seconds_bucket{cluster_queue="cluster-pipeline-queue", workload_name_prefix="mintmaker", le="300", source_cluster="c1"}'
        values: '0 1 2'
      - series: 'kueue_admission_wait_time_seconds_bucket{cluster_queue="cluster-pipeline-queue", workload_name_prefix="mintmaker", le="600", source_cluster="c1"}'
        values: '0 5 10'
      - series: 'kueue_admission_wait_time_seconds_bucket{cluster_queue="cluster-pipeline-queue", workload_name_prefix="mintmaker", le="+Inf", source_cluster="c1"}'
        values: '0 5 10'
    alert_rule_test:
      - eval_time: 6m
        alertname: KueueHighAdmissionWaitTimeMintmaker
        exp_alerts:
          - exp_labels:
              severity: warning
              component: kueue
              source_cluster: c1
            exp_annotations:
              summary: "High admission wait time for Mintmaker pipelines"
              description: "99th percentile wait time for Mintmaker is 596.25s (>5m) in cluster c1"
              alert_routing_key: infra
              team: konflux-infra