evaluation_interval: 1m

rule_files:
  - prometheus.cluster_ongoing_updrade_alert.yaml

tests:
  - interval: 1m
    input_series:
      # Scenario: Upgrade in progress (soak days = -2.5, falls within <= -2 and >= -3)
      - series: 'aus_cluster_version_remaining_soak_days{cluster_uuid="uuid-1"}'
        values: '-2.5x10'
      - series: 'aus_cluster_upgrade_policy_info{cluster_uuid="uuid-1", cluster_name="prod-cluster", org_name="redhat", current_version="4.14.1"}'
        values: '1x10'

    alert_rule_test:
      - alertname: ClusterUpgradeOngoing
        eval_time: 10m
        exp_alerts:
          - exp_labels:
              severity: info
              component: release-service
              team: release
              slo: "false"
              tenant: rhtap
              cluster_uuid: "uuid-1"
              cluster_name: "prod-cluster"
              org_name: "redhat"
              current_version: "4.14.1"
            exp_annotations:
              summary: "Cluster upgrade ongoing: prod-cluster"
              description: >-
                Cluster prod-cluster (Org: redhat) is currently undergoing an upgrade.
                Current version: 4.14.1
              alert_routing_key: "release"
              alert_team_handle: "<!subteam^S03SVBS426R>"
              team: release
              runbook_url: "https://gitlab.cee.redhat.com/konflux/docs/sop/"

  - interval: 1m
    input_series:
      # Scenario: Normal state (soak days = 5), alert should NOT fire
      - series: 'aus_cluster_version_remaining_soak_days{cluster_uuid="uuid-1"}'
        values: '5x10'
      - series: 'aus_cluster_upgrade_policy_info{cluster_uuid="uuid-1", cluster_name="prod-cluster", org_name="redhat", current_version="4.14.1"}'
        values: '1x10'

    alert_rule_test:
      - alertname: ClusterUpgradeOngoing
        eval_time: 10m
        exp_alerts: []

  - interval: 1m
    input_series:
      # Scenario: Out of specific range (soak days = -1), alert should NOT fire based on your logic
      - series: 'aus_cluster_version_remaining_soak_days{cluster_uuid="uuid-1"}'
        values: '-1x10'
      - series: 'aus_cluster_upgrade_policy_info{cluster_uuid="uuid-1", cluster_name="prod-cluster", org_name="redhat", current_version="4.14.1"}'
        values: '1x10'

    alert_rule_test:
      - alertname: ClusterUpgradeOngoing
        eval_time: 10m
        exp_alerts: []
