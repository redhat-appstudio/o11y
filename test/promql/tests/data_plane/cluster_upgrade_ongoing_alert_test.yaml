evaluation_interval: 1m

rule_files:
  - prometheus.cluster_ongoing_updrade_alert.yaml

tests:
  - name: ClusterUpgradeOngoingFiring
    interval: 1m
    input_series:
      - series: 'aus_cluster_version_remaining_soak_days{cluster_uuid="8b7e2632-7cc9-4da8-9016-d08241fdc1ec"}'
        values: '-2x60'
      - series: 'aus_cluster_upgrade_policy_info{cluster_uuid="8b7e2632-7cc9-4da8-9016-d08241fdc1ec", cluster_name="hs-mc-s73832cng", org_name="rhtap-org", current_version="4.15.10"}'
        values: '1x60'

    alert_rule_test:
      - eval_time: 10m
        alertname: ClusterUpgradeOngoing
        exp_alerts:
          - exp_labels:
              severity: info
              component: release-service
              team: release
              slo: "false"
              cluster_uuid: "8b7e2632-7cc9-4da8-9016-d08241fdc1ec"
              cluster_name: "hs-mc-s73832cng"
              org_name: "rhtap-org"
              current_version: "4.15.10"
            exp_annotations:
              summary: "Cluster upgrade ongoing: hs-mc-s73832cng"
              description: >-
                Cluster hs-mc-s73832cng (Org: rhtap-org) is currently undergoing an upgrade.
                Current version: 4.15.10
                Soak days status: -2
              alert_routing_key: "release"
              alert_team_handle: "<!subteam^S03SVBS426R>"
              team: release
              runbook_url: "https://gitlab.cee.redhat.com/konflux/docs/sop/"

  - name: ClusterUpgradeOngoingNotFiring
    interval: 1m
    input_series:
      - series: 'aus_cluster_version_remaining_soak_days{cluster_uuid="8b7e2632-7cc9-4da8-9016-d08241fdc1ec"}'
        values: '0x60'
      - series: 'aus_cluster_upgrade_policy_info{cluster_uuid="8b7e2632-7cc9-4da8-9016-d08241fdc1ec", cluster_name="hs-mc-s73832cng"}'
        values: '1x60'
    alert_rule_test:
      - eval_time: 10m
        alertname: ClusterUpgradeOngoing
        exp_alerts: []
