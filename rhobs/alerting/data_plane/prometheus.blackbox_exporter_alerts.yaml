apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rhtap-blackbox-exporter-alerting-rules
  labels:
    tenant: rhtap
spec:
  groups:
  - name: blackbox-exporter-availability
    interval: 1m
    rules:
    - alert: BlackboxExporterDown
      expr: |
        konflux_up{
          namespace="appstudio-monitoring",
          check="replicas-available",
          deployment="blackbox-exporter-obo",
          service="blackbox-exporter-obo"
        } != 1
      for: 5m
      labels:
        severity: high
        slo: "false"
        component: blackbox-exporter
      annotations:
        summary: >-
          blackbox-exporter is down in cluster {{ $labels.source_cluster }}
        description: >
          The blackbox-exporter-obo pod has been down for 5min in cluster {{ $labels.source_cluster }}
        team: o11y
        alert_routing_key: o11y
        runbook_url: https://gitlab.cee.redhat.com/konflux/docs/sop/-/blob/main/o11y/exporters/blackbox/blackbox-troubleshooting.md
